<svg xmlns="http://www.w3.org/2000/svg" width="40" height="46" viewBox="0 0 40 46" fill="none">
  <defs>
    <!-- Soft 3D Drop Shadow -->
    <filter id="handShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1.5" dy="2.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.38"/>
    </filter>

    <!-- Main Brand Red Gradient -->
    <linearGradient id="brandRedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D56"/>
      <stop offset="45%" stop-color="#FF1E27"/>
      <stop offset="100%" stop-color="#D6000C"/>
    </linearGradient>

    <!-- Crescent Moon Gradient -->
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFD1D4" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <g filter="url(#handShadow)">
    <!-- Main Outer Path enclosing all 5 distinct fingers (1.Thumb, 2.Index, 3.Middle, 4.Ring, 5.Pinky) -->
    <path d="M 14 2 
             C 11.8 2 10 3.8 10 6 
             L 10 18.5 
             C 8.2 16.8 5.5 16.8 3.8 18.5 
             C 2.2 20.2 2.2 22.8 3.8 24.5 
             L 6.5 28.5 
             C 9 32.5 13 34.5 17.5 34.5 
             L 22.5 34.5 
             C 27.5 34.5 31.5 30.5 31.5 25.5 
             L 31.5 20 
             C 31.5 18.3 30.2 17 28.5 17 
             C 27.8 17 27.1 17.3 26.5 17.8 
             C 25.8 15.8 24.2 14.5 22.2 14.5 
             C 21.5 14.5 20.8 14.8 20.2 15.3 
             C 19.5 13.8 17.8 12.5 15.8 12.5 
             L 15.8 6 
             C 15.8 3.8 14 2 14 2 
             Z" 
          fill="url(#brandRedGrad)" 
          stroke="#7A0005" 
          stroke-width="2" 
          stroke-linejoin="round" 
          stroke-linecap="round" />

    <!-- Explicit 5 Finger Divider Lines separating: 
         1. Thumb 
         2. Index Finger 
         3. Middle Finger 
         4. Ring Finger 
         5. Pinky Finger -->
    <!-- Divider 1: Thumb from Palm / Index -->
    <path d="M 10 18.5 C 7.5 21.5 7.5 25 8.8 28" stroke="#5E0004" stroke-width="1.8" stroke-linecap="round" />
    
    <!-- Divider 2: Index Finger from Middle Finger -->
    <path d="M 15.8 12.5 L 15.8 24" stroke="#5E0004" stroke-width="1.8" stroke-linecap="round" />
    
    <!-- Divider 3: Middle Finger from Ring Finger -->
    <path d="M 20.8 14.5 L 20.8 24.5" stroke="#5E0004" stroke-width="1.8" stroke-linecap="round" />
    
    <!-- Divider 4: Ring Finger from Pinky Finger -->
    <path d="M 26.5 17 L 26.5 25" stroke="#5E0004" stroke-width="1.8" stroke-linecap="round" />

    <!-- Minimal Crescent Moon in Palm -->
    <path d="M 20 23.5 C 17 23.5 15 25.5 15 28 C 15 30.5 17 32.5 20 32.5 C 18.2 31.8 17 30 17 28 C 17 26 18.2 24.2 20 23.5 Z" 
          fill="url(#moonGrad)" 
          opacity="0.9" />

    <!-- Star Sparkles -->
    <circle cx="14" cy="7" r="0.7" fill="#FFFFFF" />
    <circle cx="14" cy="11.5" r="0.6" fill="#FFFFFF" opacity="0.8" />
    <circle cx="22" cy="28.5" r="0.6" fill="#FFFFFF" opacity="0.85" />
  </g>
</svg>