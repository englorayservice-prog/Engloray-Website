<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E2F" />
      <stop offset="100%" stop-color="#0F0F1A" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" />
  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="2">
    <path d="M50 0 V400 M100 0 V400 M150 0 V400 M200 0 V400 M250 0 V400 M300 0 V400 M350 0 V400" />
    <path d="M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400 M0 250 H400 M0 300 H400 M0 350 H400" />
  </g>
  <!-- Abstract Drop -->
  <path d="M200 80 C 280 200, 300 280, 200 320 C 100 280, 120 200, 200 80 Z" fill="url(#dropGrad)" filter="url(#glow)" opacity="0.9" />
  <!-- AI Sparkle -->
  <path d="M200 130 L 210 170 L 250 180 L 210 190 L 200 230 L 190 190 L 150 180 L 190 170 Z" fill="#ffffff" opacity="0.8" />
</svg>
