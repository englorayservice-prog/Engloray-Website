<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141827"/>
      <stop offset="100%" stop-color="#0B0D14"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <pattern id="checker" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="rgba(255,255,255,0.05)"/>
      <rect width="14" height="14" fill="rgba(255,255,255,0.10)"/>
      <rect x="14" y="14" width="14" height="14" fill="rgba(255,255,255,0.10)"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="roundClip">
      <circle cx="200" cy="195" r="105"/>
    </clipPath>
  </defs>

  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- subtle grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="2">
    <path d="M50 0 V400 M100 0 V400 M150 0 V400 M200 0 V400 M250 0 V400 M300 0 V400 M350 0 V400"/>
    <path d="M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400 M0 250 H400 M0 300 H400 M0 350 H400"/>
  </g>

  <!-- badge -->
  <circle cx="200" cy="195" r="120" fill="rgba(255,255,255,0.06)"/>
  <circle cx="200" cy="195" r="106" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <!-- checker background inside -->
  <g clip-path="url(#roundClip)">
    <rect x="95" y="90" width="210" height="210" fill="url(#checker)"/>
    <!-- "cutout" swoosh -->
    <path d="M112 240 C 150 175, 212 160, 288 172 C 250 240, 195 270, 140 284 C 126 288, 112 270, 112 240 Z"
          fill="rgba(11,13,20,0.75)"/>
  </g>

  <!-- eraser stroke -->
  <path d="M125 150 L255 280" stroke="url(#accentGrad)" stroke-width="18" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M140 150 L260 270" stroke="rgba(255,255,255,0.45)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- label -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" text-anchor="middle">
    <text x="200" y="350" font-size="26" fill="rgba(255,255,255,0.92)" font-weight="700">remove.bg</text>
    <text x="200" y="374" font-size="14" fill="rgba(255,255,255,0.60)">background removal</text>
  </g>
</svg>
